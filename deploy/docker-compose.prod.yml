services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    restart: unless-stopped
    expose:
      - "5000"

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
