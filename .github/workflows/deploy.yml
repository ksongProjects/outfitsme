name: Production Deployment (SSM)

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  APP_DIR: /home/ubuntu/app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set immutable image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-backend:${{ steps.meta.outputs.image_tag }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/react-frontend:${{ steps.meta.outputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package deploy bundle
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          SETTINGS_ENCRYPTION_KEY: ${{ secrets.SETTINGS_ENCRYPTION_KEY }}
          DEFAULT_ANALYSIS_MODEL: ${{ secrets.DEFAULT_ANALYSIS_MODEL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          set -euo pipefail
          : "${CERTBOT_EMAIL:?CERTBOT_EMAIL GitHub secret is required}"

          BUNDLE_DIR="$RUNNER_TEMP/deploy-bundle"
          mkdir -p "$BUNDLE_DIR/proxy" "$BUNDLE_DIR/deploy"

          cp compose.yaml "$BUNDLE_DIR/compose.yaml"
          cp proxy/nginx.http.conf "$BUNDLE_DIR/proxy/nginx.http.conf"
          cp proxy/nginx.ssl.conf "$BUNDLE_DIR/proxy/nginx.ssl.conf"
          cp deploy/remote-deploy.sh "$BUNDLE_DIR/deploy/remote-deploy.sh"
          chmod +x "$BUNDLE_DIR/deploy/remote-deploy.sh"

          {
            printf 'export APP_DIR=%q\n' "$APP_DIR"
            printf 'export DOCKERHUB_USERNAME=%q\n' "$DOCKERHUB_USERNAME"
            printf 'export IMAGE_TAG=%q\n' "$IMAGE_TAG"
            printf 'export CORS_ALLOWED_ORIGINS=%q\n' "$CORS_ALLOWED_ORIGINS"
            printf 'export SUPABASE_URL=%q\n' "$SUPABASE_URL"
            printf 'export SUPABASE_SECRET_KEY=%q\n' "$SUPABASE_SECRET_KEY"
            printf 'export SUPABASE_BUCKET=%q\n' "$SUPABASE_BUCKET"
            printf 'export GEMINI_API_KEY=%q\n' "$GEMINI_API_KEY"
            printf 'export GEMINI_MODEL=%q\n' "$GEMINI_MODEL"
            printf 'export GEMINI_IMAGE_MODEL=%q\n' "$GEMINI_IMAGE_MODEL"
            printf 'export SETTINGS_ENCRYPTION_KEY=%q\n' "$SETTINGS_ENCRYPTION_KEY"
            printf 'export DEFAULT_ANALYSIS_MODEL=%q\n' "$DEFAULT_ANALYSIS_MODEL"
            printf 'export DATABASE_URL=%q\n' "$DATABASE_URL"
            printf 'export BETTER_AUTH_SECRET=%q\n' "$BETTER_AUTH_SECRET"
            printf 'export CERTBOT_EMAIL=%q\n' "$CERTBOT_EMAIL"
          } > "$BUNDLE_DIR/deploy.env.sh"

          tar -C "$BUNDLE_DIR" -czf "$RUNNER_TEMP/outfitme-deploy.tgz" .

      - name: Upload deploy bundle to S3
        id: bundle
        env:
          DEPLOY_ARTIFACTS_BUCKET: ${{ secrets.DEPLOY_ARTIFACTS_BUCKET }}
        run: |
          set -euo pipefail
          : "${DEPLOY_ARTIFACTS_BUCKET:?DEPLOY_ARTIFACTS_BUCKET GitHub secret is required}"

          S3_KEY="deploy-bundles/${GITHUB_SHA}/outfitme-deploy.tgz"
          aws s3 cp "$RUNNER_TEMP/outfitme-deploy.tgz" "s3://${DEPLOY_ARTIFACTS_BUCKET}/${S3_KEY}"
          echo "s3_bucket=${DEPLOY_ARTIFACTS_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "s3_key=${S3_KEY}" >> "$GITHUB_OUTPUT"

      - name: Create temporary pre-signed deploy bundle URL
        id: bundle_url
        run: |
          set -euo pipefail
          BUNDLE_URL="$(aws s3 presign "s3://${{ steps.bundle.outputs.s3_bucket }}/${{ steps.bundle.outputs.s3_key }}" --expires-in 1800)"
          echo "deploy_bundle_url=${BUNDLE_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM and verify command status
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_BUNDLE_URL: ${{ steps.bundle_url.outputs.deploy_bundle_url }}
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/remote-bootstrap.sh" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail

          APP_DIR='${APP_DIR}'
          BUNDLE_PATH="/tmp/outfitme-deploy.tgz"
          EXTRACT_DIR="/tmp/outfitme-deploy"

          rm -rf "\${EXTRACT_DIR}"
          mkdir -p "\${EXTRACT_DIR}" "\${APP_DIR}"

          curl -fsSL "${DEPLOY_BUNDLE_URL}" -o "\${BUNDLE_PATH}"
          tar -C "\${EXTRACT_DIR}" -xzf "\${BUNDLE_PATH}"

          mkdir -p "\${APP_DIR}/proxy" "\${APP_DIR}/deploy"
          cp "\${EXTRACT_DIR}/compose.yaml" "\${APP_DIR}/compose.yaml"
          cp "\${EXTRACT_DIR}/proxy/nginx.http.conf" "\${APP_DIR}/proxy/nginx.http.conf"
          cp "\${EXTRACT_DIR}/proxy/nginx.ssl.conf" "\${APP_DIR}/proxy/nginx.ssl.conf"
          cp "\${EXTRACT_DIR}/deploy/remote-deploy.sh" "\${APP_DIR}/deploy/remote-deploy.sh"
          chmod +x "\${APP_DIR}/deploy/remote-deploy.sh"

          source "\${EXTRACT_DIR}/deploy.env.sh"
          bash "\${APP_DIR}/deploy/remote-deploy.sh"
          EOF

          REMOTE_B64="$(base64 -w0 "$RUNNER_TEMP/remote-bootstrap.sh")"
          SSM_PARAMS="$(jq -cn \
            --arg cmd1 "printf '%s' '$REMOTE_B64' | base64 -d > /tmp/remote-deploy.sh" \
            --arg cmd2 "chmod +x /tmp/remote-deploy.sh" \
            --arg cmd3 "bash /tmp/remote-deploy.sh" \
            '{commands: [$cmd1, $cmd2, $cmd3]}')"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA}" \
            --parameters "$SSM_PARAMS" \
            --query "Command.CommandId" \
            --output text)"

          if ! aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"; then
            echo "SSM waiter reported a terminal failure state."
          fi
          STATUS="$(aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --details \
            --query "CommandInvocations[0].Status" \
            --output text)"

          echo "SSM command status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "SSM plugin output:"
            aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query "CommandInvocations[0].CommandPlugins[0].Output" \
              --output text || true
            echo "SSM full invocation:"
            aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --output json || true
            exit 1
          fi

      - name: Remove deploy bundle from S3
        if: ${{ always() && steps.bundle.outputs.s3_bucket != '' && steps.bundle.outputs.s3_key != '' }}
        run: |
          set -euo pipefail
          aws s3 rm "s3://${{ steps.bundle.outputs.s3_bucket }}/${{ steps.bundle.outputs.s3_key }}" || true
