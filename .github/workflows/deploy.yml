name: Production Deployment (SSM)

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  APP_DIR: /home/ubuntu/app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set immutable image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-backend:${{ steps.meta.outputs.image_tag }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/react-frontend:${{ steps.meta.outputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    steps:
      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM and verify command status
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_IMAGE_MODEL: ${{ secrets.GEMINI_IMAGE_MODEL }}
          SETTINGS_ENCRYPTION_KEY: ${{ secrets.SETTINGS_ENCRYPTION_KEY }}
          DEFAULT_ANALYSIS_MODEL: ${{ secrets.DEFAULT_ANALYSIS_MODEL }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          set -euo pipefail

          COMPOSE_B64="$(base64 -w0 compose.yaml)"
          NGINX_B64="$(base64 -w0 proxy/nginx.conf)"
          NGINX_HTTP_B64="$(base64 -w0 proxy/nginx.http.conf)"
          NGINX_SSL_B64="$(base64 -w0 proxy/nginx.ssl.conf)"
          REMOTE_DEPLOY_B64="$(base64 -w0 deploy/remote-deploy.sh)"
          DOCKERHUB_USERNAME_B64="$(printf '%s' "$DOCKERHUB_USERNAME" | base64 -w0)"
          IMAGE_TAG_B64="$(printf '%s' "$IMAGE_TAG" | base64 -w0)"
          CORS_ALLOWED_ORIGINS_B64="$(printf '%s' "$CORS_ALLOWED_ORIGINS" | base64 -w0)"
          SUPABASE_URL_B64="$(printf '%s' "$SUPABASE_URL" | base64 -w0)"
          SUPABASE_SECRET_KEY_B64="$(printf '%s' "$SUPABASE_SECRET_KEY" | base64 -w0)"
          SUPABASE_BUCKET_B64="$(printf '%s' "$SUPABASE_BUCKET" | base64 -w0)"
          GEMINI_MODEL_B64="$(printf '%s' "$GEMINI_MODEL" | base64 -w0)"
          GEMINI_IMAGE_MODEL_B64="$(printf '%s' "$GEMINI_IMAGE_MODEL" | base64 -w0)"
          SETTINGS_ENCRYPTION_KEY_B64="$(printf '%s' "$SETTINGS_ENCRYPTION_KEY" | base64 -w0)"
          DEFAULT_ANALYSIS_MODEL_B64="$(printf '%s' "$DEFAULT_ANALYSIS_MODEL" | base64 -w0)"
          CERTBOT_EMAIL_B64="$(printf '%s' "$CERTBOT_EMAIL" | base64 -w0)"

          cat > "$RUNNER_TEMP/remote-bootstrap.sh" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail

          mkdir -p "${APP_DIR}/proxy" "${APP_DIR}/deploy"

          echo '${COMPOSE_B64}' | base64 -d > "${APP_DIR}/compose.yaml"
          echo '${NGINX_B64}' | base64 -d > "${APP_DIR}/proxy/nginx.conf"
          echo '${NGINX_HTTP_B64}' | base64 -d > "${APP_DIR}/proxy/nginx.http.conf"
          echo '${NGINX_SSL_B64}' | base64 -d > "${APP_DIR}/proxy/nginx.ssl.conf"
          echo '${REMOTE_DEPLOY_B64}' | base64 -d > "${APP_DIR}/deploy/remote-deploy.sh"

          chmod +x "${APP_DIR}/deploy/remote-deploy.sh"

          export APP_DIR='${APP_DIR}'
          export DOCKERHUB_USERNAME="$(echo '${DOCKERHUB_USERNAME_B64}' | base64 -d)"
          export IMAGE_TAG="$(echo '${IMAGE_TAG_B64}' | base64 -d)"
          export CORS_ALLOWED_ORIGINS="$(echo '${CORS_ALLOWED_ORIGINS_B64}' | base64 -d)"
          export SUPABASE_URL="$(echo '${SUPABASE_URL_B64}' | base64 -d)"
          export SUPABASE_SECRET_KEY="$(echo '${SUPABASE_SECRET_KEY_B64}' | base64 -d)"
          export SUPABASE_BUCKET="$(echo '${SUPABASE_BUCKET_B64}' | base64 -d)"
          export GEMINI_MODEL="$(echo '${GEMINI_MODEL_B64}' | base64 -d)"
          export GEMINI_IMAGE_MODEL="$(echo '${GEMINI_IMAGE_MODEL_B64}' | base64 -d)"
          export SETTINGS_ENCRYPTION_KEY="$(echo '${SETTINGS_ENCRYPTION_KEY_B64}' | base64 -d)"
          export DEFAULT_ANALYSIS_MODEL="$(echo '${DEFAULT_ANALYSIS_MODEL_B64}' | base64 -d)"
          export CERTBOT_EMAIL="$(echo '${CERTBOT_EMAIL_B64}' | base64 -d)"

          sudo -E bash "${APP_DIR}/deploy/remote-deploy.sh"
          EOF

          REMOTE_B64="$(base64 -w0 "$RUNNER_TEMP/remote-bootstrap.sh")"
          SSM_PARAMS="$(jq -cn \
            --arg cmd1 "echo '$REMOTE_B64' | base64 -d > /tmp/remote-deploy.sh" \
            --arg cmd2 "chmod +x /tmp/remote-deploy.sh" \
            --arg cmd3 "sudo /tmp/remote-deploy.sh" \
            '{commands: [$cmd1, $cmd2, $cmd3]}')"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA}" \
            --parameters "$SSM_PARAMS" \
            --query "Command.CommandId" \
            --output text)"

          if ! aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"; then
            echo "SSM waiter reported a terminal failure state."
          fi
          STATUS="$(aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --details \
            --query "CommandInvocations[0].Status" \
            --output text)"

          echo "SSM command status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "SSM plugin output:"
            aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query "CommandInvocations[0].CommandPlugins[0].Output" \
              --output text || true
            echo "SSM full invocation:"
            aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --output json || true
            exit 1
          fi
