name: Sync Production Deploy Assets

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  APP_DIR: /home/ubuntu/app

jobs:
  sync-assets:
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify target EC2 instance is online in Systems Manager
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          : "${EC2_INSTANCE_ID:?EC2_INSTANCE_ID GitHub secret is required}"

          INSTANCE_STATE="$(aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)"

          echo "EC2 instance state: $INSTANCE_STATE"
          if [ "$INSTANCE_STATE" != "running" ]; then
            echo "EC2 instance $EC2_INSTANCE_ID is not running in ${AWS_REGION}."
            exit 1
          fi

          for attempt in {1..12}; do
            SSM_INFO="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --output json)"

            if [ "$(jq '.InstanceInformationList | length' <<<"$SSM_INFO")" -gt 0 ]; then
              SSM_PING_STATUS="$(jq -r '.InstanceInformationList[0].PingStatus' <<<"$SSM_INFO")"
              SSM_AGENT_VERSION="$(jq -r '.InstanceInformationList[0].AgentVersion' <<<"$SSM_INFO")"
              echo "SSM ping status: $SSM_PING_STATUS"
              echo "SSM agent version: $SSM_AGENT_VERSION"

              if [ "$SSM_PING_STATUS" = "Online" ]; then
                break
              fi
            else
              echo "Instance is not registered with Systems Manager yet (attempt $attempt/12)."
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "EC2 instance $EC2_INSTANCE_ID is not online in Systems Manager."
              echo "Check that the instance ID secret is current, the instance role includes AmazonSSMManagedInstanceCore,"
              echo "the SSM agent is installed/running, and the instance can reach SSM endpoints in ${AWS_REGION}."
              exit 1
            fi

            sleep 10
          done

      - name: Sync checked-in deploy assets via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          for relative_path in (
              "compose.yaml",
              "deploy/remote-deploy.sh",
              "proxy/nginx.http.conf",
              "proxy/nginx.ssl.conf",
          ):
              path = Path(relative_path)
              text = path.read_text(encoding="utf-8-sig")
              path.write_text(text.replace("\r\n", "\n"), encoding="utf-8")
          PY

          REMOTE_BOOTSTRAP="$RUNNER_TEMP/remote-bootstrap.sh"
          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo "APP_DIR='${APP_DIR}'"
            echo 'install -d -m 755 "${APP_DIR}" "${APP_DIR}/proxy" "${APP_DIR}/deploy" /etc/outfitsme'
          } > "$REMOTE_BOOTSTRAP"

          append_file() {
            local source_path="$1"
            local destination_path="$2"
            local mode="$3"
            local destination_dir
            local payload

            destination_dir="$(dirname "$destination_path")"
            payload="$(base64 -w0 "$source_path")"

            {
              printf 'install -d -m 755 %q\n' "$destination_dir"
              printf "printf '%%s' '%s' | base64 -d > %q\n" "$payload" "$destination_path"
              printf 'chmod %s %q\n' "$mode" "$destination_path"
            } >> "$REMOTE_BOOTSTRAP"
          }

          append_file compose.yaml "${APP_DIR}/compose.yaml" 644
          append_file proxy/nginx.http.conf "${APP_DIR}/proxy/nginx.http.conf" 644
          append_file proxy/nginx.ssl.conf "${APP_DIR}/proxy/nginx.ssl.conf" 644
          append_file deploy/remote-deploy.sh "${APP_DIR}/deploy/remote-deploy.sh" 755

          REMOTE_B64="$(base64 -w0 "$REMOTE_BOOTSTRAP")"
          SSM_PARAMS="$(jq -cn \
            --arg cmd1 "printf '%s' '$REMOTE_B64' | base64 -d > /tmp/remote-sync-assets.sh" \
            --arg cmd2 "chmod +x /tmp/remote-sync-assets.sh" \
            --arg cmd3 "bash /tmp/remote-sync-assets.sh" \
            '{commands: [$cmd1, $cmd2, $cmd3]}')"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Sync deploy assets ${GITHUB_SHA}" \
            --parameters "$SSM_PARAMS" \
            --query "Command.CommandId" \
            --output text)"

          if ! aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"; then
            echo "SSM waiter reported a terminal failure state."
          fi

          STATUS="$(aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --details \
            --query "CommandInvocations[0].Status" \
            --output text)"

          echo "SSM command status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "SSM plugin output:"
            aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --query "CommandInvocations[0].CommandPlugins[0].Output" \
              --output text || true
            echo "SSM full invocation:"
            aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --details \
              --output json || true
            exit 1
          fi
