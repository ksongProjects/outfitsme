name: Terraform Plan Serverless Infra

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  TERRAFORM_DIR: infra/aws-serverless

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      SERVERLESS_TERRAFORM_TFVARS_JSON: ${{ secrets.SERVERLESS_TERRAFORM_TFVARS_JSON }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write Terraform variables file from secret
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          set -euo pipefail
          : "${SERVERLESS_TERRAFORM_TFVARS_JSON:?SERVERLESS_TERRAFORM_TFVARS_JSON is required}"
          cat > ci.auto.tfvars.json <<'JSON'
          ${{ secrets.SERVERLESS_TERRAFORM_TFVARS_JSON }}
          JSON

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform fmt
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan -out=tfplan
