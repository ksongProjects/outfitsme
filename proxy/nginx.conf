events {
    worker_connections 1024;
}

http {
    # Main server block
    server {
        listen 80;
        server_name _; # Accepts traffic from any IP/Domain

        # Route to Frontend
        location / {
            proxy_pass http://frontend:3000; # Use the service name from docker-compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route to Backend API
        location /api {
            proxy_pass http://backend:5000; # Use the service name from docker-compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}